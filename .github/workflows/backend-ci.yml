name: Backend CI

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "shared/**"
      - "frontend/**"
      - "rust-toolchain.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/backend-ci.yml"
      - ".spectral.yaml"
      - "backend/openapi.json"

jobs:
  backend-validate:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      # Baked into `backend` via `option_env!("GIT_COMMIT_SHA")` for `GET /api/v1/about`.
      GIT_COMMIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Build
        working-directory: backend
        run: cargo build

      - name: Test
        working-directory: backend
        run: cargo test

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: OpenAPI Spectral (committed backend/openapi.json)
        run: npx --yes @stoplight/spectral-cli@6 lint backend/openapi.json -r .spectral.yaml

      - name: Clippy
        working-directory: backend
        run: cargo clippy -- -D warnings

      - name: Format check
        run: |
          cargo fmt --manifest-path backend/Cargo.toml --check
          cargo fmt --manifest-path shared/Cargo.toml --check

  docker-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: xilefmusics/worshipviewer
          tags: |
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
