name: Sessions endpoints
vars:
  base_url: http://127.0.0.1:8080
  token_admin: admin

testcases:
  # BLC: BLC-USER-003
  - name: create-session-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "sessionuser@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "sessionuser@test.com"
          - result.bodyjson.role ShouldEqual "default"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-SESS-006, BLC-USER-011, BLC-SESS-001, BLC-SESS-002
  - name: create-session-primary
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.user.id ShouldEqual "{{.create-session-user.userid}}"
        vars:
          sessionid_primary:
            from: result.bodyjson.id

  # BLC: BLC-SESS-006, BLC-USER-011, BLC-SESS-001, BLC-SESS-002
  - name: create-session-secondary
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.user.id ShouldEqual "{{.create-session-user.userid}}"
        vars:
          sessionid_secondary:
            from: result.bodyjson.id

  # BLC: BLC-AUTH-001
  - name: get-me-sessions-missing-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-002
  - name: get-me-sessions-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SESS-003, BLC-USER-010
  - name: get-me-sessions-admin
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-SESS-004, BLC-USER-010
  - name: get-me-session-admin
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions/admin"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "admin"

  # Matches `get-me-session-admin` via GET /users/me/sessions/current (credential used on the wire).
  - name: get-me-current-session-admin
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions/current"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "admin"

  # BLC: BLC-SESS-004
  - name: get-me-session-admin-notfound
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions/unknown"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-SESS-003, BLC-USER-010
  - name: get-me-sessions-default
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 2

  # BLC: BLC-SESS-004, BLC-USER-010
  - name: get-me-session-default
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions/{{.create-session-primary.sessionid_primary}}"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "{{.create-session-primary.sessionid_primary}}"
          - result.bodyjson.user.id ShouldEqual "{{.create-session-user.userid}}"

  # BLC: BLC-SESS-004
  - name: get-me-session-default-notfound
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions/invalid"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-AUTH-002
  - name: get-me-session-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions/{{.create-session-primary.sessionid_primary}}"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-001
  - name: delete-me-session-missing-token
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/me/sessions/{{.create-session-secondary.sessionid_secondary}}"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-002
  - name: delete-me-session-invalid-token
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/me/sessions/{{.create-session-secondary.sessionid_secondary}}"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SESS-004
  - name: delete-me-session-invalid
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/me/sessions/nonexistent"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-SESS-004, BLC-SESS-009
  - name: delete-me-session
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/me/sessions/{{.create-session-secondary.sessionid_secondary}}"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 204

  # BLC: BLC-SESS-003, BLC-USER-010
  - name: get-me-sessions-after-delete
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-AUTH-001
  - name: post-session-missing-token
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SESS-005, BLC-SESS-007
  - name: post-session-default-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 403

  # BLC: BLC-SESS-006
  - name: post-session-invalid-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/invalid/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-AUTH-002
  - name: post-session-admin-invalid-token
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-001
  - name: get-sessions-for-user-missing-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SESS-005, BLC-SESS-007
  - name: get-sessions-for-user-default
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 403

  # BLC: BLC-SESS-006, BLC-USER-011
  - name: get-sessions-for-user-admin
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-AUTH-002
  - name: get-sessions-for-user-admin-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-001
  - name: get-session-for-user-missing-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SESS-005, BLC-SESS-007
  - name: get-session-for-user-default
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-session-primary.sessionid_primary}}"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 403

  # BLC: BLC-SESS-006, BLC-USER-011
  - name: get-session-for-user-admin
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-session-primary.sessionid_primary}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "{{.create-session-primary.sessionid_primary}}"
          - result.bodyjson.user.id ShouldEqual "{{.create-session-user.userid}}"

  # BLC: BLC-SESS-006, BLC-USER-011
  - name: get-session-for-user-admin-notfound
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/missing"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-AUTH-002
  - name: get-session-for-user-admin-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-session-primary.sessionid_primary}}"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-001
  - name: delete-session-for-user-missing-token
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SESS-005, BLC-SESS-007
  - name: delete-session-for-user-default
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-session-primary.sessionid_primary}}"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 403

  # Security: BLC-SESS-004 — caller may not delete another user's session via /me (IDOR check)
  # Must run while create-session-primary.sessionid_primary is still valid (before admin deletes it).
  - name: create-idor-other-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "sessionidor@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          idor_userid:
            from: result.bodyjson.id

  - name: create-idor-other-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-idor-other-user.idor_userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          idor_sessionid:
            from: result.bodyjson.id

  # Caller A (create-session-primary) tries to delete caller B's session via /me — must be 404
  - name: delete-me-session-cross-user-idor
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/me/sessions/{{.create-idor-other-session.idor_sessionid}}"
        headers:
          Authorization: "Bearer {{.create-session-primary.sessionid_primary}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # Admin: wrong user_id in path for an existing session must return 404, not 200
  - name: get-session-for-wrong-user-id
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-idor-other-session.idor_sessionid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  - name: delete-session-for-wrong-user-id
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-idor-other-session.idor_sessionid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # Teardown: clean up the extra user created for IDOR testing
  - name: delete-idor-other-user
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.create-idor-other-user.idor_userid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 204

  # BLC: BLC-SESS-006, BLC-USER-011
  - name: delete-session-for-user-admin
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-session-primary.sessionid_primary}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 204

  # BLC: BLC-AUTH-002
  - name: delete-session-for-user-admin-invalid-token
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-session-secondary.sessionid_secondary}}"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SESS-006, BLC-USER-011
  - name: delete-session-for-user-admin-notfound
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}/sessions/{{.create-session-primary.sessionid_primary}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-USER-011, BLC-SESS-006
  - name: delete-session-user
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/users/{{.create-session-user.userid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 204

