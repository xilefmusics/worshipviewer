  # BLC: BLC-AUTH-001
  - name: post-collection-missing-token
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/collections"
        headers:
          Content-Type: application/json
        body: |
          {
            "title": "Missing Token Collection",
