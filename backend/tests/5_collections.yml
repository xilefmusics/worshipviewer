name: Collections endpoints
vars:
  base_url: http://127.0.0.1:8080
  token_admin: admin

testcases:
  # Setup: Users and sessions
  # BLC: BLC-USER-003
  - name: create-collection-owner-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "collectionowner@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "collectionowner@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-collection-owner-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-collection-owner-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-001, BLC-COLL-011
  - name: get-collection-owner-personal-team
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.create-collection-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
        vars:
          owner_personal_team_id:
            from: result.bodyjson.bodyjson0.id

  # BLC: BLC-BLOB-009, BLC-BLOB-005
  - name: post-collection-cover-blob
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/blobs"
        headers:
          Authorization: "Bearer {{.create-collection-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "file_type": "image/png",
            "width": 1024,
            "height": 768,
            "ocr": "Collection cover blob"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          blobid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: create-collection-read-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "collectionread@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "collectionread@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-collection-read-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-collection-read-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: create-collection-write-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "collectionwrite@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "collectionwrite@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-collection-write-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-collection-write-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: create-collection-noperm-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "collectionnoperm@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "collectionnoperm@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-collection-noperm-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-collection-noperm-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-011, BLC-COLL-002
  - name: configure-collection-owner-team-acl
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.get-collection-owner-personal-team.owner_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.create-collection-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Personal",
            "members": [
              { "user": { "id": "{{.create-collection-read-user.userid}}" }, "role": "guest" },
              { "user": { "id": "{{.create-collection-write-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-SONG-009
  - name: create-noperm-user-song
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/songs"
        headers:
          Authorization: "Bearer {{.create-collection-noperm-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "not_a_song": false,
            "blobs": [],
            "data": {
              "titles": ["No Perm User Private Song"],
              "sections": []
            }
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          songid:
            from: result.bodyjson.id

  # Setup: Songs to link in collections
  # BLC: BLC-SONG-009
  - name: create-collection-song-one
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/songs"
        headers:
          Authorization: "Bearer {{.create-collection-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "not_a_song": false,
            "blobs": [],
            "data": {
              "titles": ["Collection Song One"],
              "sections": []
            }
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.data.titles ShouldHaveLength 1
          - result.bodyjson.data.titles.titles0 ShouldEqual "Collection Song One"
        vars:
          songid:
            from: result.bodyjson.id

  # BLC: BLC-SONG-009
  - name: create-collection-song-two
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/songs"
        headers:
          Authorization: "Bearer {{.create-collection-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "not_a_song": false,
            "blobs": [],
            "data": {
              "titles": ["Collection Song Two"],
              "sections": []
            }
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.data.titles ShouldHaveLength 1
          - result.bodyjson.data.titles.titles0 ShouldEqual "Collection Song Two"
        vars:
          songid:
            from: result.bodyjson.id

  # POST /api/v1/collections
  # BLC: BLC-COLL-009, BLC-COLL-003
  - name: post-collection-success
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/collections"
        headers:
          Authorization: "Bearer {{.create-collection-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "title": "Favorite Collection",
            "cover": "cover-one",
            "songs": [
              { "id": "{{.create-collection-song-one.songid}}", "nr": "1" },
              { "id": "{{.create-collection-song-two.songid}}", "nr": "2" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.owner ShouldEqual "{{.get-collection-owner-personal-team.owner_personal_team_id}}"
          - result.bodyjson.title ShouldEqual "Favorite Collection"
          - result.bodyjson.songs ShouldHaveLength 2
        vars:
          collectionid:
            from: result.bodyjson.id

  # BLC: BLC-COLL-009, BLC-COLL-003
  - name: post-collection-with-real-cover
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/collections"
        headers:
          Authorization: "Bearer {{.create-collection-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "title": "Blob Backed Collection",
            "cover": "{{.post-collection-cover-blob.blobid}}",
            "songs": [
              { "id": "{{.create-collection-song-one.songid}}", "nr": "1" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.cover ShouldEqual "{{.post-collection-cover-blob.blobid}}"
        vars:
          cascade_collection_id:
            from: result.bodyjson.id

  # BLC: BLC-COLL-008
  - name: post-collection-invalid-payload-missing-title
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/collections"
        headers:
          Authorization: "Bearer {{.create-collection-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "cover": "cover-two",
            "songs": [
              { "id": "{{.create-collection-song-one.songid}}" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-COLL-008
