name: Users me endpoint
vars:
  base_url: http://127.0.0.1:8080
  token_admin: admin

testcases:
  # BLC: BLC-USER-005
  - name: get-users-me-admin
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-USER-005, BLC-USER-006
  - name: get-users-me-raw-authorization-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me"
        headers:
          Authorization: "{{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-002
  - name: get-users-me-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-001
  - name: get-users-me-missing-auth
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-USER-003, BLC-USER-001, BLC-USER-002
  - name: post-users
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "anormaluser@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "anormaluser@test.com"
          - result.bodyjson.role ShouldEqual "default"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-008
  - name: post-users-mail-conflict
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "anormaluser@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 409

  # BLC: BLC-USER-008
  - name: post-users-invalid-mail
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "invalid"
          }
        assertions:
          - result.statuscode ShouldEqual 400
  
  # BLC: BLC-USER-008
  - name: post-users-missing-mail
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {}
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-AUTH-002
  - name: post-users-invalid-token
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer invalid"
          Content-Type: application/json
        body: |
          {
            "email": "invalid"
          }
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-001
  - name: post-users-missing-token
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Content-Type: application/json
        body: |
          {
            "email": "invalid"
          }
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-USER-007
  - name: get-users-admin
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.__Len__ ShouldBeGreaterThanOrEqualTo 2

  # BLC: BLC-USER-007
  - name: get-users-admin-paginated
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?page=0&page_size=1"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-AUTH-002
  - name: get-users-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-001
  - name: get-users-missing-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users"
        assertions:
          - result.statuscode ShouldEqual 401
  
  # BLC: BLC-LP-004
  - name: get-users-invalid-page-parameter
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?page=invalid&page_size=1"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 400
  
  # BLC: BLC-LP-004
  - name: get-users-invalid-page-size-parameter
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?page=0&page_size=invalid"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-LP-006
  - name: get-users-admin-page-size-zero
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?page=0&page_size=0"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-LP-007
  - name: get-users-admin-page-only
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?page=0"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.__Len__ ShouldBeGreaterThanOrEqualTo 2

  # BLC: BLC-LP-007
  - name: get-users-admin-page-size-only
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?page_size=1"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.__Len__ ShouldEqual 1

  # BLC: BLC-LP-008
  - name: get-users-admin-page-beyond-range
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?page=10&page_size=10"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 0
  
  # BLC: BLC-LP-003, BLC-LP-009
  - name: get-users-q-email-match
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?q=anormaluser"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.id ShouldEqual "{{.post-users.userid}}"

  # BLC: BLC-LP-003, BLC-LP-009
  - name: get-users-q-with-pagination
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?q=anormaluser&page=0&page_size=1"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-LP-003, BLC-LP-008
  - name: get-users-q-no-matches
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?q=UserNoSuchTokenEver999zz"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 0

  # BLC: BLC-LP-005
  - name: get-users-q-blank-still-paginates-like-omit
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?q=%20&page_size=1"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-LP-003
  - name: get-users-q-by-id
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users?q={{.post-users.userid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.id ShouldEqual "{{.post-users.userid}}"
  
  # BLC: BLC-USER-007, BLC-USER-009
  - name: get-user
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.post-users.userid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "{{.post-users.userid}}"
          - result.bodyjson.email ShouldEqual "anormaluser@test.com"
          - result.bodyjson.role ShouldEqual "default"

  # BLC: BLC-AUTH-002
  - name: get-user-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.post-users.userid}}"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-001
  - name: get-user-no-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.post-users.userid}}"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-USER-007
  - name: get-invalid-user
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/invalid"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-USER-011
  - name: create-session-for-default-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.post-users.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: ""
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-second-session-for-default-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.post-users.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: ""
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid2:
            from: result.bodyjson.id

  # BLC: BLC-LP-003, BLC-LP-009
  - name: get-sessions-for-user-q-match-first
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.post-users.userid}}/sessions?q={{.create-session-for-default-user.sessionid}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.id ShouldEqual "{{.create-session-for-default-user.sessionid}}"

  # BLC: BLC-LP-003, BLC-LP-008
  - name: get-sessions-for-user-q-no-matches
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.post-users.userid}}/sessions?q=SessionNoSuchTokenEver999zz"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 0

  # BLC: BLC-LP-005
  - name: get-sessions-for-user-q-blank-ignored
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.post-users.userid}}/sessions?q=%20"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 2

  # BLC: BLC-LP-003
  - name: get-me-sessions-q-match-second
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me/sessions?q={{.create-second-session-for-default-user.sessionid2}}"
        headers:
          Authorization: "Bearer {{.create-session-for-default-user.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.id ShouldEqual "{{.create-second-session-for-default-user.sessionid2}}"

  # BLC: BLC-TEAM-001
  - name: get-default-user-personal-team
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.create-session-for-default-user.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
        vars:
          default_user_personal_team_id:
            from: result.bodyjson.bodyjson0.id

  # BLC: BLC-USER-003
  - name: create-cascade-verifier-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "cascadeverifier@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-cascade-verifier-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-cascade-verifier-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-011
  - name: add-cascade-verifier-to-default-user-team
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.get-default-user-personal-team.default_user_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.create-session-for-default-user.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Personal",
            "members": [
              { "user": { "id": "{{.create-cascade-verifier-user.userid}}" }, "role": "guest" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-USER-009
  - name: get-user-read-grant-on-target-owner
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/{{.post-users.userid}}"
        headers:
          Authorization: "Bearer {{.create-cascade-verifier-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 403

  # BLC: BLC-USER-003
  - name: create-default-user-blob
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/blobs"
        headers:
          Authorization: "Bearer {{.create-session-for-default-user.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "file_type": "image/png",
            "width": 640,
            "height": 480,
            "ocr": "Cascade test blob"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.owner ShouldEqual "{{.get-default-user-personal-team.default_user_personal_team_id}}"
        vars:
          blobid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003, BLC-SONG-009
  - name: create-default-user-song-collection-setup
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/collections"
        headers:
          Authorization: "Bearer {{.create-session-for-default-user.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "title": "Cascade Song Collection",
            "cover": "{{.create-default-user-blob.blobid}}",
            "songs": []
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.owner ShouldEqual "{{.get-default-user-personal-team.default_user_personal_team_id}}"
        vars:
          collectionid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: create-default-user-song
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/songs"
        headers:
          Authorization: "Bearer {{.create-session-for-default-user.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "collection": "{{.create-default-user-song-collection-setup.collectionid}}",
            "not_a_song": false,
            "blobs": [],
            "data": {
              "titles": ["Cascade Song"],
              "sections": []
            }
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.owner ShouldEqual "{{.get-default-user-personal-team.default_user_personal_team_id}}"
        vars:
          songid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: create-default-user-setlist
    steps:
