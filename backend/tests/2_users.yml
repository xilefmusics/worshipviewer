          - result.statuscode ShouldEqual 204

  # BLC: BLC-USER-005
  - name: get-users-me-default
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/users/me"
        headers:
          Authorization: "Bearer {{.create-session-for-default-user.sessionid}}"
        assertions:
