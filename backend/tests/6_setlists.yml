name: Setlists endpoints
vars:
  base_url: http://127.0.0.1:8080
  token_admin: admin

testcases:
  # Setup users and sessions
  # BLC: BLC-USER-003
  - name: create-setlist-owner-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "setlistowner@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "setlistowner@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-setlist-owner-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-setlist-owner-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-001, BLC-SETL-011
  - name: get-setlist-owner-personal-team
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
        vars:
          owner_personal_team_id:
            from: result.bodyjson.bodyjson0.id

  # BLC: BLC-USER-003
  - name: create-setlist-read-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "setlistread@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "setlistread@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-setlist-read-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-setlist-read-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: create-setlist-write-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "setlistwrite@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "setlistwrite@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-setlist-write-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-setlist-write-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003
  - name: create-setlist-noperm-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "setlistnoperm@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.email ShouldEqual "setlistnoperm@test.com"
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: create-setlist-noperm-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.create-setlist-noperm-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-011, BLC-SETL-002
  - name: configure-setlist-owner-team-acl
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.get-setlist-owner-personal-team.owner_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Personal",
            "members": [
              { "user": { "id": "{{.create-setlist-read-user.userid}}" }, "role": "guest" },
              { "user": { "id": "{{.create-setlist-write-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  # Create songs for linking
  # BLC: BLC-SONG-009
  - name: setup-setlist-owner-song-collection
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/collections"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "title": "Test Collection",
            "cover": "mysongs",
            "songs": []
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          setlist_owner_song_collection_id:
            from: result.bodyjson.id

  - name: create-setlist-song-one
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/songs"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "collection": "{{.setup-setlist-owner-song-collection.setlist_owner_song_collection_id}}",
            "not_a_song": false,
            "blobs": [],
            "data": {
              "titles": ["Setlist Song One"],
              "sections": []
            }
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.data.titles ShouldHaveLength 1
          - result.bodyjson.data.titles.titles0 ShouldEqual "Setlist Song One"
        vars:
          songid:
            from: result.bodyjson.id

  # BLC: BLC-SONG-009
  - name: create-setlist-song-two
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/songs"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "collection": "{{.setup-setlist-owner-song-collection.setlist_owner_song_collection_id}}",
            "not_a_song": false,
            "blobs": [],
            "data": {
              "titles": ["Setlist Song Two"],
              "sections": []
            }
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.data.titles ShouldHaveLength 1
          - result.bodyjson.data.titles.titles0 ShouldEqual "Setlist Song Two"
        vars:
          songid:
            from: result.bodyjson.id

  # POST /setlists validations
  # BLC: BLC-SETL-004
  - name: post-setlist-missing-songs
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "title": "Missing Songs"
          }
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-SETL-004, BLC-AUTH-001
  - name: post-setlist-missing-token
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Content-Type: application/json
        body: |
          {
            "title": "Unauthorized Setlist",
            "songs": [
              { "id": "{{.create-setlist-song-one.songid}}" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-002
  - name: post-setlist-invalid-token
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer invalid"
          Content-Type: application/json
        body: |
          {
            "title": "Invalid Token Setlist",
            "songs": [
              { "id": "{{.create-setlist-song-one.songid}}" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SETL-004
  - name: post-setlist-missing-title
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "songs": [
              { "id": "{{.create-setlist-song-one.songid}}" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-SETL-004
  - name: post-setlist-empty-title-rejected
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "title": "",
            "songs": [
              { "id": "{{.create-setlist-song-two.songid}}", "nr": "1" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-SETL-009, BLC-SETL-004
  - name: post-setlist-success
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "title": "Sunday Morning Set",
            "songs": [
              { "id": "{{.create-setlist-song-one.songid}}", "nr": "1" },
              { "id": "{{.create-setlist-song-two.songid}}", "nr": "2" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.owner ShouldEqual "{{.get-setlist-owner-personal-team.owner_personal_team_id}}"
          - result.bodyjson.title ShouldEqual "Sunday Morning Set"
          - result.bodyjson.songs ShouldHaveLength 2
        vars:
          setlistid:
            from: result.bodyjson.id

  # BLC: BLC-SETL-009, BLC-SETL-008
  - name: post-setlist-for-delete-by-write
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "title": "Setlist Delete By Write User",
            "songs": [
              { "id": "{{.create-setlist-song-one.songid}}", "nr": "1" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          setlistid:
            from: result.bodyjson.id

  # GET /setlists
  # BLC: BLC-SETL-010, BLC-SETL-005, BLC-LP-001, BLC-LP-002
  - name: get-setlists-owner
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 2

  # BLC: BLC-SETL-010, BLC-SETL-005, BLC-LP-001, BLC-LP-002
  - name: get-setlists-owner-paginated
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?page=0&page_size=1"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-SETL-010
  - name: get-setlists-read-user
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer {{.create-setlist-read-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 2

  # BLC: BLC-SETL-006
  - name: get-setlists-noperm-user
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer {{.create-setlist-noperm-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 0

  # BLC: BLC-AUTH-001
  - name: get-setlists-missing-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-002
  - name: get-setlists-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-LP-004
  - name: get-setlists-invalid-page-parameter
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?page=invalid&page_size=1"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-LP-004
  - name: get-setlists-invalid-page-size-parameter
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?page=0&page_size=invalid"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-LP-006, BLC-SETL-010, BLC-SETL-005, BLC-LP-001, BLC-LP-002
  - name: get-setlists-owner-page-size-zero
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?page=0&page_size=0"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-LP-007, BLC-SETL-010, BLC-SETL-005, BLC-LP-001, BLC-LP-002
  - name: get-setlists-owner-page-only
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?page=0"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 2

  # BLC: BLC-LP-007, BLC-SETL-010, BLC-SETL-005, BLC-LP-001, BLC-LP-002
  - name: get-setlists-owner-page-size-only
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?page_size=1"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-LP-008, BLC-SETL-010, BLC-SETL-005, BLC-LP-001, BLC-LP-002
  - name: get-setlists-owner-page-beyond-range
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?page=10&page_size=10"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 0

  # BLC: BLC-LP-003
  - name: get-setlists-q-match
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?q=Sunday"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.id ShouldEqual "{{.post-setlist-success.setlistid}}"

  # BLC: BLC-LP-003 — title substring (mid-word; full-text alone would not match)
  - name: get-setlists-q-title-substring
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?q=ornin"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.id ShouldEqual "{{.post-setlist-success.setlistid}}"

  # BLC: BLC-LP-009, BLC-LP-003
  - name: get-setlists-q-with-pagination
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?q=Sunday&page=0&page_size=1"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.id ShouldEqual "{{.post-setlist-success.setlistid}}"

  # BLC: BLC-LP-003, BLC-LP-008, BLC-SETL-010
  - name: get-setlists-q-no-matches-empty-array
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?q=SetlistNoSuchTokenEver999zz"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 0

  # BLC: BLC-LP-005
  - name: get-setlists-q-blank-ignored-full-list
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists?q=%20"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 2

  # GET /setlists/{id}
  # BLC: BLC-SETL-011
  - name: get-setlist-owner
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.id ShouldEqual "{{.post-setlist-success.setlistid}}"
          - result.bodyjson.songs ShouldHaveLength 2

  # BLC: BLC-SETL-011
  - name: get-setlist-read-user
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}"
        headers:
          Authorization: "Bearer {{.create-setlist-read-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-SETL-006
  - name: get-setlist-noperm-user
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}"
        headers:
          Authorization: "Bearer {{.create-setlist-noperm-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-AUTH-002
  - name: get-setlist-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-AUTH-001
  - name: get-setlist-missing-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SETL-006
  - name: get-setlist-notfound
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/never-created-setlist"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-HTTP-001
  - name: get-setlist-invalid-id
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/song:invalid"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 400

  # GET /setlists/{id}/songs
  # BLC: BLC-SETL-011
  - name: get-setlist-songs-owner
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}/songs"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 2

  # BLC: BLC-SETL-011
  - name: get-setlist-songs-read-user
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}/songs"
        headers:
          Authorization: "Bearer {{.create-setlist-read-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 2

  # BLC: BLC-SETL-006
  - name: get-setlist-songs-noperm-user
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}/songs"
        headers:
          Authorization: "Bearer {{.create-setlist-noperm-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-AUTH-001
  - name: get-setlist-songs-missing-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}/songs"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-HTTP-001
  - name: get-setlist-songs-invalid-id
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/song:invalid/songs"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 400

  # BLC: BLC-AUTH-002
  - name: get-setlist-songs-invalid-token
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/{{.post-setlist-success.setlistid}}/songs"
        headers:
          Authorization: "Bearer invalid"
        assertions:
          - result.statuscode ShouldEqual 401

  # BLC: BLC-SETL-006
  - name: get-setlist-songs-notfound
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/setlists/never-created-setlist/songs"
        headers:
          Authorization: "Bearer {{.create-setlist-owner-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # GET /setlists/{id}/player
  # BLC: BLC-SETL-011
  - name: get-setlist-player-owner
