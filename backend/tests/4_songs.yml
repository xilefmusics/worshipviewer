  # BLC: BLC-TEAM-011, BLC-SONG-002
  - name: configure-song-owner-team-acl
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.get-song-owner-personal-team.owner_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.create-song-owner-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Personal",
            "members": [
              { "user": { "id": "{{.create-read-user.userid}}" }, "role": "guest" },
              { "user": { "id": "{{.create-write-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

