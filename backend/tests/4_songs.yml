          Content-Type: application/json
        body: |
          {
            "collection": "{{.setup-song-owner-test-collection.song_owner_collection_id}}",
            "not_a_song": false,
            "blobs": [],
            "data": {
              "titles": ["VenomsTitleTokenX9 Alpha"],
              "artists": ["Other Person"],
              "sections": [
                {
                  "title": "V",
                  "lines": [
                    {
                      "parts": [
                        { "languages": ["la la la"], "comment": false }
                      ]
                    }
                  ]
                }
              ]
            }
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
