          {
            "email": "team-maintainer@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-003, BLC-USER-011
  - name: team-create-maintainer-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-maintainer-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-011, BLC-TEAM-012
  - name: team-lead-add-content-maintainer
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Shared Duplicate Name",
            "members": [
              { "user": { "id": "{{.team-create-lead-user.userid}}" }, "role": "admin" },
              { "user": { "id": "{{.team-create-guest-user.userid}}" }, "role": "guest" },
              { "user": { "id": "{{.team-create-maintainer-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-TEAM-010, BLC-TEAM-013
  - name: team-maintainer-cannot-update-shared
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-maintainer-session.sessionid}}"
