  # BLC: BLC-TEAM-011, BLC-TEAM-012
  - name: team-lead-updates-shared
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Updated Shared Title"
          }
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.name ShouldEqual "Updated Shared Title"

  # BLC: BLC-TEAM-013
  - name: team-guest-put-forbidden-wrong-name-self-shaped
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Wrong Title",
            "members": [
              { "user": { "id": "{{.team-create-lead-user.userid}}" }, "role": "admin" },
              { "user": { "id": "{{.team-create-maintainer-user.userid}}" }, "role": "content_maintainer" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 403

  # BLC: BLC-TEAM-013
