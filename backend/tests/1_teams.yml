  # BLC: BLC-TEAM-011, BLC-TEAM-012
  - name: team-sole-add-second-admin
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-sole-create-shared.sole_team_id}}"
