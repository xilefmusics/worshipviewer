name: Teams endpoints
vars:
  base_url: http://127.0.0.1:8080
  token_admin: admin

testcases:
  # BLC: BLC-TEAM-001, BLC-TEAM-005, BLC-TEAM-007
  - name: team-admin-initial-list
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.name ShouldEqual "Personal"
          - result.bodyjson.bodyjson0.owner.email ShouldEqual "admin@example.com"
          - result.bodyjson.bodyjson0.members ShouldHaveLength 0
        vars:
          admin_personal_team_id:
            from: result.bodyjson.bodyjson0.id

  # BLC: BLC-TEAM-007
  - name: team-get-public-not-exposed
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/public"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-TEAM-007
  - name: team-list-excludes-public
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.body ShouldNotContainSubstring '"id":"public"'

  # BLC: BLC-USER-003
  - name: team-create-solo-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "team-solo@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: team-create-solo-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-solo-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-001, BLC-TEAM-007, BLC-TEAM-010
  - name: team-solo-sees-personal-only
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.team-create-solo-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.name ShouldEqual "Personal"
          - result.bodyjson.bodyjson0.owner.email ShouldEqual "team-solo@test.com"
          - result.bodyjson.bodyjson0.members ShouldHaveLength 0
        vars:
          solo_personal_team_id:
            from: result.bodyjson.bodyjson0.id

  # BLC: BLC-TEAM-003, BLC-TEAM-012
  - name: team-solo-rename-personal
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-solo-sees-personal-only.solo_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.team-create-solo-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Renamed Personal"
          }
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.name ShouldEqual "Renamed Personal"

  # BLC: BLC-TEAM-006
  - name: team-solo-cannot-delete-personal
    steps:
      - type: http
        method: DELETE
        url: "{{.base_url}}/api/v1/teams/{{.team-solo-sees-personal-only.solo_personal_team_id}}"
        headers:
          Authorization: "Bearer {{.team-create-solo-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 403

  # BLC: BLC-USER-003
  - name: team-create-lead-user
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users"
        headers:
          Authorization: "Bearer {{.token_admin}}"
          Content-Type: application/json
        body: |
          {
            "email": "team-lead@test.com"
          }
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          userid:
            from: result.bodyjson.id

  # BLC: BLC-USER-011
  - name: team-create-lead-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-lead-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-008, BLC-TEAM-002, BLC-TEAM-004
  - name: team-lead-create-shared-a
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Shared Duplicate Name"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.name ShouldEqual "Shared Duplicate Name"
          - result.bodyjson.members ShouldHaveLength 1
        vars:
          shared_team_a_id:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-008, BLC-TEAM-002, BLC-TEAM-004
  - name: team-lead-create-shared-b-same-name
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Shared Duplicate Name"
          }
        assertions:
          - result.statuscode ShouldEqual 201
          - result.bodyjson.name ShouldEqual "Shared Duplicate Name"
        vars:
          shared_team_b_id:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-007, BLC-TEAM-010
  - name: team-lead-list-personal-and-shared
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 3

  # BLC: BLC-TEAM-007
  - name: team-platform-admin-sees-only-own-teams
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.body ShouldNotContainSubstring "{{.team-lead-create-shared-a.shared_team_a_id}}"
          - result.body ShouldNotContainSubstring "{{.team-lead-create-shared-b-same-name.shared_team_b_id}}"
          - result.body ShouldNotContainSubstring "{{.team-solo-sees-personal-only.solo_personal_team_id}}"

  # BLC: BLC-LP-003, BLC-LP-005, BLC-LP-009
  - name: team-list-q-match-name
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams?q=Duplicate"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 2

  # BLC: BLC-LP-003, BLC-LP-009
  - name: team-list-q-with-pagination
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams?q=Duplicate&page=0&page_size=1"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1

  # BLC: BLC-LP-003
  - name: team-list-q-by-id
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams?q={{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 1
          - result.bodyjson.bodyjson0.id ShouldEqual "{{.team-lead-create-shared-a.shared_team_a_id}}"

  # BLC: BLC-LP-003, BLC-LP-008
  - name: team-list-q-no-matches
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams?q=TeamNoSuchTokenEver999zz"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 0

  # BLC: BLC-LP-005
  - name: team-list-q-blank-ignored-full-list
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams?q=%20"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson ShouldHaveLength 3

  # BLC: BLC-TEAM-007
  - name: team-platform-admin-cannot-get-foreign-shared-team
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 404

  # BLC: BLC-USER-003
  - name: team-create-guest-user
    steps:
      - type: http
        method: POST
