  # BLC: BLC-USER-003, BLC-USER-011
  - name: team-create-guest-session
    steps:
      - type: http
        method: POST
        url: "{{.base_url}}/api/v1/users/{{.team-create-guest-user.userid}}/sessions"
        headers:
          Authorization: "Bearer {{.token_admin}}"
        assertions:
          - result.statuscode ShouldEqual 201
        vars:
          sessionid:
            from: result.bodyjson.id

  # BLC: BLC-TEAM-011, BLC-TEAM-012
  - name: team-lead-add-guest
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-lead-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Shared Duplicate Name",
            "members": [
              { "user": { "id": "{{.team-create-lead-user.userid}}" }, "role": "admin" },
              { "user": { "id": "{{.team-create-guest-user.userid}}" }, "role": "guest" }
            ]
          }
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-TEAM-010, BLC-TEAM-013
  - name: team-guest-can-read-shared
    steps:
      - type: http
        method: GET
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
        assertions:
          - result.statuscode ShouldEqual 200

  # BLC: BLC-TEAM-010, BLC-TEAM-013
  - name: team-guest-cannot-update-shared
    steps:
      - type: http
        method: PUT
        url: "{{.base_url}}/api/v1/teams/{{.team-lead-create-shared-a.shared_team_a_id}}"
        headers:
          Authorization: "Bearer {{.team-create-guest-session.sessionid}}"
          Content-Type: application/json
        body: |
          {
            "name": "Hijack Attempt"
          }
        assertions:
          - result.statuscode ShouldEqual 403

